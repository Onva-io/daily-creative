# Railway config-as-code (must live at repo root so Railway discovers it).
# Keep in sync with infra/railway/railway.toml when changing deploy settings.
#
# Dashboard: set service Root Directory to /backend (that directory is the
# Docker build context). Config path stays absolute from the repo root.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
releaseCommand = "alembic upgrade head"
