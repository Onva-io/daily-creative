# Railway config-as-code — single source of truth for the API service.
#
# Dashboard:
# - Root Directory: /backend (Docker build context)
# - Config as Code: /railway.toml (absolute from repo; does not follow Root Directory)
# - Use "Deploy Latest Commit" (not Redeploy) after config changes
# - Clear any custom Start Command in the dashboard so the image CMD is used
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "railway.toml"]

[deploy]
# Explicit script so any dashboard Start Command is overridden; PORT expands inside the script.
# Migrations run in start.sh (same pattern as local Compose) — more reliable than releaseCommand
# on Railway Dockerfile deploys, where the release phase can be skipped or fail silently.
startCommand = "./scripts/start.sh"
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
