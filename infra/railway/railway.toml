# Canonical copy for deploys is at the repo root: /railway.toml
# Railway only auto-discovers railway.toml at the service root (default `/`).
#
# Dashboard: set service Root Directory to /backend (that directory is the
# Docker build context). Config-as-code path stays absolute from the repo
# (e.g. /railway.toml or /infra/railway/railway.toml).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
releaseCommand = "alembic upgrade head"
