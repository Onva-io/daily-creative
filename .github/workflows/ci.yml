name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Repository checks
        run: make repo-checks

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Install backend tooling
        run: make backend-install
      - name: Validate OpenAPI
        run: make api-validate
      - name: Ensure generated client is committed and fresh
        run: |
          if [ ! -d api/generated/ios ]; then
            echo "api/generated/ios missing; run make api-generate-ios and commit" >&2
            exit 1
          fi
          make api-check-generated

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: dailysketch
          POSTGRES_PASSWORD: dailysketch
          POSTGRES_DB: dailysketch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dailysketch -d dailysketch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://dailysketch:dailysketch@localhost:5432/dailysketch
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: dailysketch-ci-media
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_USE_SSL: "false"
    steps:
      - uses: actions/checkout@v7
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "MinIO failed to become healthy" >&2
          docker logs minio || true
          exit 1
      - name: Create MinIO bucket
        run: |
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc:RELEASE.2025-08-13T08-35-41Z \
            mb --ignore-existing local/dailysketch-ci-media
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8
      - name: Install
        run: make backend-install
      - name: Lint
        run: make backend-lint
      - name: Typecheck
        run: make backend-typecheck
      - name: Test
        run: make backend-test
      - name: Apply migrations
        run: make db-migrate

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: make docker-build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0
      - name: Scan for secrets
        run: detect-secrets scan --baseline .secrets.baseline --exclude-files 'api/generated/.*|spec/stitch_daily_sketch_journal\.zip|\.env$'

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: make ios-generate
      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/DailySketch.xcodeproj \
            -scheme DailySketch \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.1' \
            -configuration Debug-Local \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Unit tests
        run: |
          xcodebuild \
            -project ios/DailySketch.xcodeproj \
            -scheme DailySketch \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.1' \
            -configuration Debug-Local \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:DailySketchTests \
            test
